<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>compass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: "Playfair Display", Georgia, serif; }</style>

    <style>
      * { box-sizing: border-box; }
      body { font-family: "Playfair Display", Georgia, serif; overflow-x: hidden; }
      
      @media (max-width: 768px) {
        /* Review screen - stack columns */
        .review-grid { grid-template-columns: 1fr !important; }
        
        /* Cases - full width */
        .cases-grid { grid-template-columns: 1fr !important; }
        
        /* Nav - scrollable */
        nav { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        /* Modals - full screen on mobile */
        .modal-inner { max-width: 100% !important; margin: 10px !important; }
        
        /* Buttons - larger tap targets */
        button { min-height: 36px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
